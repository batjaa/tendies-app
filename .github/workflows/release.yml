name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/TendiesApp \
            .build/x86_64-apple-macosx/release/TendiesApp \
            -output TendiesApp-universal
          chmod +x TendiesApp-universal

      - name: Bundle and sign .app
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: bash scripts/bundle.sh TendiesApp-universal

      - name: Zip .app
        run: zip -r TendiesApp.zip TendiesApp.app

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/notarize.sh TendiesApp.zip

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 TendiesApp.zip | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TendiesApp.zip
          generate_release_notes: true

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          CASK_FILE="Casks/tendies-app.rb"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/batjaa/homebrew-tools.git tap
          cd tap

          mkdir -p Casks
          cat > "$CASK_FILE" <<EOF
          cask "tendies-app" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/batjaa/tendies-app/releases/download/v#{version}/TendiesApp.zip"
            name "TendiesApp"
            desc "macOS menu bar app for tracking day trading P&L"
            homepage "https://github.com/batjaa/tendies-app"

            app "TendiesApp.app"
          end
          EOF

          # Remove leading whitespace from heredoc indentation
          sed -i '' 's/^          //' "$CASK_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "Update tendies-app to ${VERSION}"
          git push

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
